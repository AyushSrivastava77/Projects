<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rubo — Intelligent Cube Engine</title>

<style>
body {
    margin:0;
    background: radial-gradient(circle at top, #020617, #000000);
    overflow:hidden;
    font-family: "SF Pro Display", monospace;
    color:#e2e8f0;
}

/* LEFT PANEL */
#ui {
    position:fixed;
    top:20px;
    left:20px;
    padding:20px;
    width:220px;

    background: rgba(15,23,42,0.6);
    backdrop-filter: blur(12px);

    border:1px solid rgba(56,189,248,0.3);
    border-radius:16px;

    box-shadow: 0 0 20px rgba(56,189,248,0.15);
}

/* RIGHT PANEL */
#movesList {
    position:fixed;
    right:20px;
    top:20px;
    width:260px;
    height:360px;

    padding:15px;

    background: rgba(15,23,42,0.6);
    backdrop-filter: blur(12px);

    border:1px solid rgba(56,189,248,0.3);
    border-radius:16px;

    box-shadow: 0 0 20px rgba(56,189,248,0.15);

    overflow:auto;
}

/* HEADER */
#movesList b {
    color:#38bdf8;
}

/* MOVE CONTAINER */
#movesText {
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
}

/* MOVE TILE */
.move {
    display:inline-block;
    margin:4px;
    padding:6px 8px;
    border-radius:6px;
    font-size:12px;
    font-weight:bold;
    color:black;
}

/* BUTTONS */
button {
    width:100%;
    margin:8px 0;
    padding:10px;

    background: linear-gradient(135deg, #0ea5e9, #2563eb);
    border:none;
    border-radius:8px;

    color:white;
    font-weight:600;
    cursor:pointer;

    transition: all 0.2s ease;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 12px #38bdf8;
}

/* TEXT */
#ui span {
    color:#38bdf8;
    font-weight:bold;
}

hr {
    border-color:#1e293b;
}

/* SCROLLBAR */
#movesList::-webkit-scrollbar {
    width:6px;
}
#movesList::-webkit-scrollbar-thumb {
    background:#38bdf8;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="ui">
    <h3 style="margin:0 0 10px 0; color:#38bdf8;">RUBO</h3>

    <button onclick="scramble()">Scramble</button>
    <button onclick="solve()">Solve</button>

    <hr>

    Time: <span id="time">0.00</span>s<br>
    Moves: <span id="moves">0</span>
</div>

<div id="movesList">
<b>Moves</b>
<div id="movesText"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
// ===== SCENE =====
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(5,5,6);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== CONTROLS =====
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ===== CUBE =====
let cubies = [];
let scrambleMoves = [];

function createCube(){
    cubies = [];

    for(let x=-1;x<=1;x++){
        for(let y=-1;y<=1;y++){
            for(let z=-1;z<=1;z++){

                const geometry = new THREE.BoxGeometry(0.9,0.9,0.9);

                const materials = [
                    new THREE.MeshBasicMaterial({color: x===1?0xff0000:0x222222}),
                    new THREE.MeshBasicMaterial({color: x===-1?0xffa500:0x222222}),
                    new THREE.MeshBasicMaterial({color: y===1?0xffffff:0x222222}),
                    new THREE.MeshBasicMaterial({color: y===-1?0xffff00:0x222222}),
                    new THREE.MeshBasicMaterial({color: z===1?0x00ff00:0x222222}),
                    new THREE.MeshBasicMaterial({color: z===-1?0x0000ff:0x222222}),
                ];

                const cube = new THREE.Mesh(geometry, materials);
                cube.position.set(x,y,z);

                scene.add(cube);
                cubies.push(cube);
            }
        }
    }
}

createCube();

// ===== GLOBAL =====
let moveCount = 0;
let startTime = 0;

// ===== COLOR MAP =====
const colorMap = {
    R: "#ff4d4d",
    L: "#ff9a3c",
    U: "#ffffff",
    D: "#ffd93c",
    F: "#4dff88",
    B: "#4da6ff"
};

// ===== MOVE LIST =====
function addMove(move){

    const el = document.getElementById("movesText");

    let base = move[0];
    let symbol = move.includes("'") ? "′" : "";

    const span = document.createElement("span");
    span.className = "move";
    span.style.background = colorMap[base];
    span.innerText = base + symbol;

    el.appendChild(span);
    el.scrollTop = el.scrollHeight;
}

// ===== ROTATION =====
function rotate(axis, index, dir){

    const group = new THREE.Group();
    scene.add(group);

    const selected = cubies.filter(c =>
        Math.round(c.position[axis]) === index
    );

    selected.forEach(c => group.attach(c));

    const rotAxis = new THREE.Vector3(
        axis==='x'?1:0,
        axis==='y'?1:0,
        axis==='z'?1:0
    );

    group.rotateOnAxis(rotAxis, dir*Math.PI/2);

    selected.forEach(c => scene.attach(c));
    scene.remove(group);

    moveCount++;
    document.getElementById("moves").innerText = moveCount;
}

// ===== APPLY MOVE =====
function applyMove(m){

    let d = m.includes("'") ? -1 : 1;
    let b = m[0];

    if(b==='R') rotate('x',1,d);
    if(b==='L') rotate('x',-1,-d);
    if(b==='U') rotate('y',1,d);
    if(b==='D') rotate('y',-1,-d);
    if(b==='F') rotate('z',1,d);
    if(b==='B') rotate('z',-1,-d);

    addMove(m);
}

// ===== RESET =====
function resetCube(){
    cubies.forEach(c => scene.remove(c));
    createCube();

    moveCount = 0;
    document.getElementById("moves").innerText = 0;
}

// ===== SCRAMBLE =====
function scramble(){

    resetCube();

    scrambleMoves = [];

    document.getElementById("time").innerText = "0.00";
    document.getElementById("movesText").innerHTML = "";

    let moves = ["R","L","U","D","F","B"];
    let lastMove = "";

    for(let i=0;i<20;i++){

        let m;
        do {
            m = moves[Math.floor(Math.random()*6)];
        } while(m === lastMove);

        lastMove = m;

        if(Math.random()>0.5) m += "'";

        scrambleMoves.push(m);
        applyMove(m);
    }
}

// ===== SOLVE =====
function solve(){

    startTime = performance.now();

    let solution = scrambleMoves.slice().reverse().map(m =>
        m.includes("'") ? m[0] : m+"'"
    );

    solution.forEach((m,i)=>{
        setTimeout(()=>applyMove(m), i*120);
    });

    setTimeout(()=>{
        let t = ((performance.now()-startTime)/1000).toFixed(2);
        document.getElementById("time").innerText = t;
    }, solution.length*120);
}

// ===== LOOP =====
function animate(){
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();

// ===== RESIZE =====
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
